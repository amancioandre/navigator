site_name: Navigator
site_description: Autonomous task orchestrator for Claude Code sessions
site_url: ""

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    - scheme: default

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Guides:
    - Scheduling: guides/scheduling.md
    - File Watching: guides/file-watching.md
    - Command Chaining: guides/chaining.md
    - Secrets: guides/secrets.md
    - Namespaces: guides/namespaces.md
    - Systemd Service: guides/systemd.md
  - Reference:
    - CLI: reference/cli.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - mkdocs-click
