name: docs-check

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group docs --locked

      - name: Build docs (strict)
        run: uv run mkdocs build --strict
